<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RIRIKA 自介站｜後台管理</title>
<style>
  :root {
    --blue:#4f7cff; --violet:#8b6cff; --pink:#ff5fa2;
    --bg:#0c0a1e; --bg2:#14102e; --card:#1a1638; --card2:#221c46;
    --text:#f0edff; --muted:#a49fce; --border:rgba(150,140,240,.22);
    --grad:linear-gradient(120deg,var(--blue),var(--violet) 45%,var(--pink));
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"Segoe UI",system-ui,"Noto Sans TC",sans-serif;
    background:radial-gradient(900px 500px at 0% 0%,rgba(79,124,255,.18),transparent 55%),
               radial-gradient(700px 500px at 100% 10%,rgba(255,95,162,.14),transparent 55%),
               linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--text); min-height:100vh; line-height:1.55; padding-bottom:90px;
  }

  /* Lock */
  #lock { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
          background:var(--bg); }
  .lock-box { background:var(--card); border:1px solid var(--border); border-radius:20px;
              padding:34px 30px; width:min(360px,90vw); text-align:center; }
  .lock-box h2 { font-size:20px; margin-bottom:6px; }
  .lock-box p { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .lock-box input { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
                    background:var(--bg2); color:var(--text); font-size:15px; margin-bottom:12px; }
  .lock-box button { width:100%; padding:12px; border:none; border-radius:12px; cursor:pointer;
                     background:var(--grad); color:#fff; font-weight:800; font-size:15px; }
  .lock-err { color:var(--pink); font-size:13px; margin-top:10px; min-height:18px; }

  /* Layout */
  .wrap { max-width:640px; margin:0 auto; padding:22px 16px; }
  .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .top h1 { font-size:20px; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .top a, .top button.logout { color:var(--muted); font-size:13px; text-decoration:none; background:none; border:none; cursor:pointer; }
  .hint { color:var(--muted); font-size:12.5px; margin-bottom:18px; }

  .sect { background:var(--card); border:1px solid var(--border); border-radius:16px;
          padding:16px 15px; margin-bottom:14px; }
  .sect > h2 { font-size:14px; letter-spacing:1px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .sect > h2::before { content:""; width:14px; height:3px; border-radius:3px; background:var(--grad); }

  label.lbl { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  .in { width:100%; padding:9px 11px; border-radius:10px; border:1px solid var(--border);
        background:var(--bg2); color:var(--text); font-size:14px; font-family:inherit; resize:vertical; }
  input[type=color] { width:44px; height:34px; padding:2px; border:1px solid var(--border);
                      border-radius:8px; background:var(--bg2); cursor:pointer; vertical-align:middle; }

  .row { display:flex; gap:8px; align-items:flex-start; margin-bottom:8px; }
  .row .in { flex:1; }
  .del { flex:none; width:34px; height:34px; border:1px solid var(--border); border-radius:9px;
         background:var(--card2); color:var(--pink); cursor:pointer; font-size:13px; }
  .add { border:1px dashed var(--border); background:transparent; color:var(--muted);
         padding:7px 14px; border-radius:10px; cursor:pointer; font-size:13px; margin-top:2px; }
  .add:hover { color:var(--text); }

  .item { border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; background:var(--card2); }
  .item .item-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .item .item-head strong { font-size:13px; color:var(--muted); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  .thumb { max-width:120px; border-radius:10px; margin-top:8px; display:none; border:1px solid var(--border); }
  .filebtn { display:inline-block; margin-top:8px; }
  .filebtn input { display:none; }
  .filebtn span { display:inline-block; padding:7px 14px; border:1px solid var(--border); border-radius:10px;
                  background:var(--card2); color:var(--text); cursor:pointer; font-size:13px; }

  .savebar { position:fixed; bottom:0; left:0; right:0; padding:14px 16px;
             background:rgba(12,10,30,.9); backdrop-filter:blur(10px); border-top:1px solid var(--border); }
  .savebar .inner { max-width:640px; margin:0 auto; display:flex; gap:10px; align-items:center; }
  .savebar button { flex:1; padding:13px; border:none; border-radius:12px; cursor:pointer;
                    background:var(--grad); color:#fff; font-weight:800; font-size:15px; }
  .savebar a.preview { color:var(--muted); font-size:13px; text-decoration:none; padding:10px; }

  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
           background:#241c48; border:1px solid var(--border); color:var(--text);
           padding:11px 22px; border-radius:30px; font-size:13.5px; opacity:0; transition:opacity .3s;
           pointer-events:none; z-index:60; white-space:nowrap; max-width:90vw; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<div id="lock">
  <div class="lock-box">
    <h2>🔒 後台管理</h2>
    <p>RIRIKA（莉莉卡）自我介紹站</p>
    <input type="password" id="pw" placeholder="輸入管理密碼" onkeydown="if(event.key==='Enter')unlock()" />
    <button onclick="unlock()">進入</button>
    <div class="lock-err" id="lockerr"></div>
  </div>
</div>

<div class="wrap" id="panel" style="display:none">
  <div class="top">
    <h1>⚙️ 後台管理</h1>
    <div>
      <a href="/" target="_blank">↗ 看前台</a>&nbsp;&nbsp;
      <button class="logout" onclick="logout()">登出</button>
    </div>
  </div>
  <p class="hint">改完按底部「儲存」→ 自動 commit，約 1 分鐘後前台更新。圖片上傳成功會自動填好路徑。</p>
  <div id="editor"></div>
</div>

<div class="savebar" id="savebar" style="display:none">
  <div class="inner">
    <a class="preview" href="/" target="_blank">看前台</a>
    <button onclick="save()">💾 儲存並發布</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let model = null;
let pw = "";

/* ---------- DOM helpers ---------- */
function h(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  for (const k in (attrs || {})) {
    if (k === "class") e.className = attrs[k];
    else if (k === "style") e.style.cssText = attrs[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  kids.flat().forEach((kid) => {
    if (kid == null || kid === false) return;
    e.append(kid.nodeType ? kid : document.createTextNode(kid));
  });
  return e;
}
function inp(value, on, ph) {
  const e = h("input", { class: "in", placeholder: ph || "" });
  e.value = value == null ? "" : value;
  e.addEventListener("input", () => on(e.value));
  return e;
}
function ta(value, on, ph) {
  const e = h("textarea", { class: "in", rows: "2", placeholder: ph || "" });
  e.value = value == null ? "" : value;
  e.addEventListener("input", () => on(e.value));
  return e;
}
function colorInp(value, on) {
  const e = h("input", { type: "color" });
  e.value = value || "#4f7cff";
  e.addEventListener("input", () => on(e.value));
  return e;
}
function labeled(text, node) {
  return h("div", {}, h("label", { class: "lbl" }, text), node);
}

/* string[] editor */
function strList(arr, ph, useTa) {
  const wrap = h("div", {});
  function draw() {
    wrap.innerHTML = "";
    arr.forEach((v, i) => {
      const field = (useTa ? ta : inp)(v, (nv) => (arr[i] = nv), ph);
      wrap.append(h("div", { class: "row" }, field,
        h("button", { class: "del", onclick: () => { arr.splice(i, 1); draw(); } }, "✕")));
    });
    wrap.append(h("button", { class: "add", onclick: () => { arr.push(""); draw(); } }, "＋ 新增"));
  }
  draw();
  return wrap;
}

/* image upload widget */
function imgField(obj, key) {
  const thumb = h("img", { class: "thumb" });
  const pathIn = inp(obj[key], (v) => { obj[key] = v; show(v); }, "assets/xxx.jpg");
  function show(v) {
    if (v) { thumb.src = v; thumb.style.display = "block"; }
    else thumb.style.display = "none";
  }
  show(obj[key]);
  const file = h("input", { type: "file", accept: "image/*", onchange: async (ev) => {
    const f = ev.target.files[0]; if (!f) return;
    const dataUrl = await readFile(f);
    thumb.src = dataUrl; thumb.style.display = "block";
    toast("上傳中…");
    try {
      const r = await api("/api/upload", { filename: f.name, dataUrl });
      if (r.success) { obj[key] = r.path; pathIn.value = r.path; toast("✅ 上傳成功"); }
      else toast("❌ " + (r.error || "上傳失敗"));
    } catch (e) { toast("❌ " + e.message); }
  }});
  const btn = h("label", { class: "filebtn" }, h("span", {}, "📷 選擇圖片上傳"), file);
  return h("div", {}, h("div", { class: "row" }, pathIn), btn, thumb);
}

function readFile(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}

/* ---------- sections ---------- */
function sect(title, ...nodes) {
  return h("div", { class: "sect" }, h("h2", {}, title), ...nodes);
}
function objArray(arr, factory, addLabel, blank) {
  const wrap = h("div", {});
  function draw() {
    wrap.innerHTML = "";
    arr.forEach((it, i) => {
      const box = h("div", { class: "item" },
        h("div", { class: "item-head" },
          h("strong", {}, "#" + (i + 1)),
          h("button", { class: "del", onclick: () => { arr.splice(i, 1); draw(); } }, "✕")),
        factory(it, i));
      wrap.append(box);
    });
    wrap.append(h("button", { class: "add", onclick: () => { arr.push(structuredClone(blank)); draw(); } }, addLabel));
  }
  draw();
  return wrap;
}

function renderAll() {
  const root = document.getElementById("editor");
  root.innerHTML = "";
  const m = model;

  // Profile
  root.append(sect("👤 個人頭區",
    labeled("英文名", inp(m.profile.name, v => m.profile.name = v)),
    labeled("中文名", inp(m.profile.nameZh, v => m.profile.nameZh = v)),
    labeled("頭貼", imgField(m.profile, "avatar")),
    labeled("標籤（一顆一列）", strList(m.profile.tags, "例：NSWER"))));

  // About
  root.append(sect("📝 自我介紹",
    labeled("標題", inp(m.about.title, v => m.about.title = v)),
    labeled("內容（一句一列）", strList(m.about.lines, "一行自我介紹", true))));

  // Interests
  root.append(sect("☕ 日常",
    labeled("標題", inp(m.interests.title, v => m.interests.title = v)),
    labeled("項目（一顆一列）", strList(m.interests.items, "例：睡覺"))));

  // Links
  root.append(sect("🔗 社群連結",
    objArray(m.links, (it) => h("div", {},
      labeled("平台", inp(it.platform, v => it.platform = v, "Threads")),
      labeled("顯示帳號", inp(it.label, v => it.label = v, "@nsweririka")),
      labeled("網址", inp(it.url, v => it.url = v, "https://...")),
      labeled("備註（選填）", inp(it.note, v => it.note = v))),
      "＋ 新增連結", { platform: "", label: "", url: "", note: "" })));

  // Fandoms
  root.append(sect("💖 追星區",
    objArray(m.fandoms, (it) => h("div", {},
      h("div", { class: "grid2" },
        labeled("深/淺坑", inp(it.level, v => it.level = v, "深坑")),
        labeled("團體", inp(it.group, v => it.group = v, "NMIXX"))),
      h("div", { class: "grid2" },
        labeled("主推", inp(it.bias, v => it.bias = v, "主推 Lily")),
        labeled("主題色", colorInp(it.accent, v => it.accent = v))),
      labeled("入坑時間軸", timelineEditor(it)),
      labeled("嗑點/心得（一句一列）", strList(it.notes, "一句心得", true))),
      "＋ 新增一團", { level: "", group: "", bias: "", accent: "#4f7cff", timeline: [], notes: [] })));

  // Hobbies
  root.append(sect("🎬 興趣坑",
    labeled("標題", inp(m.hobbies.title, v => m.hobbies.title = v)),
    objArray(m.hobbies.items, (it) => h("div", {},
      labeled("作品名", inp(it.name, v => it.name = v, "Chiikawa")),
      h("div", { class: "grid2" },
        labeled("入坑時間（選填）", inp(it.when, v => it.when = v, "2024 年中入坑")),
        labeled("主推角色（用 、／ 分隔）", inp(it.bias, v => it.bias = v, "吉伊、古本"))),
      labeled("備註（選填）", ta(it.note, v => it.note = v))),
      "＋ 新增作品", { name: "", when: "", bias: "", note: "" }),
    labeled("結尾標語（選填）", inp(m.hobbies.footnote, v => m.hobbies.footnote = v, "以上開電影都會刷 N 遍"))));

  // Concerts
  root.append(sect("🎤 演唱會",
    labeled("標題", inp(m.concerts.title, v => m.concerts.title = v)),
    objArray(m.concerts.items, (it) => h("div", {},
      h("div", { class: "grid2" },
        labeled("日期", inp(it.date, v => it.date = v, "2026-07")),
        labeled("團體標籤", inp(it.group, v => it.group = v, "NMIXX"))),
      labeled("演唱會名稱", inp(it.title, v => it.title = v)),
      labeled("城市", inp(it.city, v => it.city = v, "KAOHSIUNG"))),
      "＋ 新增場次", { date: "", title: "", city: "", group: "" })));

  // Support
  root.append(sect("📣 應援相關",
    labeled("標題", inp(m.support.title, v => m.support.title = v)),
    supportEditor(m.support)));

  // Footer
  root.append(sect("🔻 頁尾",
    labeled("帳號", inp(m.footer.handle, v => m.footer.handle = v, "@nsweririka")),
    labeled("連結", inp(m.footer.url, v => m.footer.url = v, "https://..."))));
}

function timelineEditor(fandom) {
  const arr = fandom.timeline;
  const wrap = h("div", {});
  function draw() {
    wrap.innerHTML = "";
    arr.forEach((t, i) => {
      wrap.append(h("div", { class: "row" },
        inp(t.when, v => t.when = v, "2025 初"),
        inp(t.what, v => t.what = v, "正式入坑"),
        h("button", { class: "del", onclick: () => { arr.splice(i, 1); draw(); } }, "✕")));
    });
    wrap.append(h("button", { class: "add", onclick: () => { arr.push({ when: "", what: "" }); draw(); } }, "＋ 新增一列"));
  }
  draw();
  return wrap;
}

function supportEditor(support) {
  const arr = support.items;
  const wrap = h("div", {});
  function draw() {
    wrap.innerHTML = "";
    arr.forEach((it, i) => {
      const typeSel = h("select", { class: "in", onchange: (e) => { it.type = e.target.value; draw(); } },
        h("option", { value: "image" }, "圖片"),
        h("option", { value: "link" }, "連結"));
      typeSel.value = it.type || "image";
      const body = h("div", {},
        h("div", { class: "grid2" },
          labeled("類型", typeSel),
          labeled("日期", inp(it.date, v => it.date = v, "2026-07"))),
        labeled("標題", inp(it.title, v => it.title = v, "Lily 杯套")),
        it.type === "link"
          ? labeled("連結網址", inp(it.url, v => it.url = v, "https://..."))
          : labeled("圖片", imgField(it, "image")),
        labeled("備註（選填）", inp(it.note, v => it.note = v)));
      wrap.append(h("div", { class: "item" },
        h("div", { class: "item-head" }, h("strong", {}, "#" + (i + 1)),
          h("button", { class: "del", onclick: () => { arr.splice(i, 1); draw(); } }, "✕")),
        body));
    });
    wrap.append(h("button", { class: "add", onclick: () => {
      arr.push({ type: "image", date: "", title: "", image: "", url: "", note: "" }); draw();
    } }, "＋ 新增應援"));
  }
  draw();
  return wrap;
}

/* ---------- shape defaults ---------- */
function ensureShape(m) {
  m.profile = m.profile || {};
  m.profile.tags = m.profile.tags || [];
  m.about = m.about || { title: "關於我", lines: [] };
  m.about.lines = m.about.lines || [];
  m.interests = m.interests || { title: "日常", items: [] };
  m.interests.items = m.interests.items || [];
  m.links = m.links || [];
  m.fandoms = (m.fandoms || []).map(f => ({
    level: "", group: "", bias: "", accent: "#4f7cff", timeline: [], notes: [], ...f
  }));
  m.hobbies = m.hobbies || { title: "興趣坑", items: [], footnote: "" };
  m.hobbies.items = m.hobbies.items || [];
  m.concerts = m.concerts || { title: "演唱會", items: [] };
  m.concerts.items = m.concerts.items || [];
  m.support = m.support || { title: "應援相關", items: [] };
  m.support.items = (m.support.items || []).map(s => ({
    type: "image", date: "", title: "", image: "", url: "", note: "", ...s
  }));
  m.footer = m.footer || { handle: "", url: "" };
}

/* ---------- api / save ---------- */
function api(url, body) {
  return fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pw, ...body }),
  }).then(r => r.json());
}
async function save() {
  toast("儲存中…");
  try {
    const r = await api("/api/save", { profile: model });
    if (r.success) toast("✅ 已儲存！約 1 分鐘後前台更新");
    else toast("❌ " + (r.error || "儲存失敗"));
  } catch (e) { toast("❌ " + e.message); }
}

/* ---------- load ---------- */
async function loadModel() {
  try {
    const r = await fetch("/api/profile", { cache: "no-store" });
    if (r.ok) return await r.json();
  } catch (e) {}
  // 本機 / 尚未部署 fallback
  return await fetch("data/profile.json?t=" + Date.now()).then(r => r.json());
}

async function unlock() {
  const val = document.getElementById("pw").value.trim();
  if (!val) { document.getElementById("lockerr").textContent = "請輸入密碼"; return; }
  pw = val;
  try {
    model = await loadModel();
    ensureShape(model);
    renderAll();
    document.getElementById("lock").style.display = "none";
    document.getElementById("panel").style.display = "block";
    document.getElementById("savebar").style.display = "block";
    sessionStorage.setItem("ririka_pw", pw);
  } catch (e) {
    document.getElementById("lockerr").textContent = "讀取失敗：" + e.message;
  }
}
function logout() {
  sessionStorage.removeItem("ririka_pw");
  location.reload();
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

// 自動恢復 session
window.addEventListener("DOMContentLoaded", () => {
  const saved = sessionStorage.getItem("ririka_pw");
  if (saved) {
    document.getElementById("pw").value = saved;
    unlock();
  }
});
</script>
</body>
</html>
